name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Archive
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project LyricSlicerAI.xcodeproj \
            -scheme LyricSlicerApp \
            -destination 'platform=iOS Simulator,name=iPad Pro (12.9-inch) (6th generation)' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Compress App Bundle
        run: |
          mkdir -p Payload
          # Find the built .app in the derived data or build directory
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "LyricSlicerApp.app" -type d | head -n 1)
          if [ -d "$APP_PATH" ]; then
            cp -r "$APP_PATH" Payload/
            zip -r LyricSlicerAI_Simulator.zip Payload
          else
            echo "App bundle not found"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyricSlicerAI-Simulator-Build
          path: LyricSlicerAI_Simulator.zip
