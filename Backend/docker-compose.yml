version: '3.8'

services:
  lyricslicer-backend:
    build: .
    container_name: lyricslicer_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
