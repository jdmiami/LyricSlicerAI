name: LyricSlicerAI
options:
  bundleIdPrefix: com.lyricslicer
  deploymentTarget:
    iOS: "16.0"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: 0.8.0

targets:
  LyricSlicerApp:
    type: application
    platform: iOS
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.lyricslicer.LyricSlicerApp
    sources: 
      - path: LyricSlicerApp
      - path: Core
      - path: LyricSlicerAU/UI
    info:
      path: LyricSlicerApp/Info.plist
      properties:
        CFBundleDisplayName: "LyricSlicer AI"
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - target: LyricSlicerAU
      - package: WhisperKit

  LyricSlicerAU:
    type: app-extension
    platform: iOS
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.lyricslicer.LyricSlicerApp.LyricSlicerAU
    sources: 
      - path: LyricSlicerAU
      - path: Core
    info:
      path: LyricSlicerAU/Info.plist
      properties:
        CFBundleDisplayName: "LyricSlicer AU"
        NSExtension:
          NSExtensionAttributes:
            AudioComponentBundle: com.lyricslicer.LyricSlicerApp.LyricSlicerAU
            AudioComponents:
              - description: LyricSlicer AI
                manufacturer: LrcS
                name: "LyricSlicer: AI Slicer"
                subtype: slce
                type: aumu
                version: 1.0.0
          NSExtensionPointIdentifier: com.apple.AudioUnit-UI
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).AudioUnitViewController"
    dependencies:
      - sdk: AudioToolbox.framework
      - sdk: AVFoundation.framework
      - sdk: CoreAudio.framework
      - sdk: CoreMedia.framework
